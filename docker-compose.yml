services:
  # PHP Application
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
        NODE_VERSION: ${NODE_VERSION:-22}
    container_name: ${APP_NAME:-laravel}_app
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www
    networks:
      - laravel
    depends_on:
      redis:
        condition: service_healthy

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: ${APP_NAME:-laravel}_nginx
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel
    depends_on:
      - app

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ${APP_NAME:-laravel}_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - laravel
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Mailpit (mail testing)
  mailpit:
    image: axllent/mailpit:latest
    container_name: ${APP_NAME:-laravel}_mailpit
    ports:
      - "${MAIL_PORT:-1025}:1025"
      - "${MAIL_DASHBOARD_PORT:-8025}:8025"
    networks:
      - laravel
    profiles:
      - tools

networks:
  laravel:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
