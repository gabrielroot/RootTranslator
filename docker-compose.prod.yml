services:
  app:
    image: ghcr.io/gabrielroot/roottranslator:latest
    container_name: ${APP_NAME:-laravel}_app_prod
    restart: unless-stopped
    volumes:
      - app_storage:/var/www/storage
    networks:
      - laravel_prod
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      REDIS_HOST: redis
    healthcheck:
      test: ["CMD-SHELL", "pgrep php-fpm > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile.prod
      args:
        APP_IMAGE: ghcr.io/gabrielroot/roottranslator:latest
    container_name: ${APP_NAME:-laravel}_nginx_prod
    restart: unless-stopped
    # ports:
    #   - "${APP_PORT:-80}:80"
    expose:
      - "80"
    volumes:
      - app_storage:/var/www/storage:ro
    networks:
      - laravel_prod
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: ${APP_NAME:-laravel}_redis_prod
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - laravel_prod
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

